sentence=Robust, dependency-free MCP2515 CAN controller driver for Arduino/ESP32.
paragraph=A clean-room MCP2515 driver written to replace the ageing Seeed/Longan "mcp_can" libraries. The caller owns SPI (no forced pins, no hidden SPI.begin), every received DLC is clamped to 8 so a malformed frame can never overrun your buffer, transmit is non-blocking (fire-and-forget across all three TX buffers), and bus-off is detected with one-call recovery. Optional loopback self-test mode. No dependencies beyond Arduino + SPI. Named "mcp_jakka" so it never gets confused with the pile of other mcp_can/mcp2515 libraries.
category=Communication
